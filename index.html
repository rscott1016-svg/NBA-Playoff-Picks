
    <html>
    <head>
        <title>NBA Lock of the Day</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body { 
                background-color: white; 
                color: black; 
                font-family: 'Inter', sans-serif; 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
                justify-content: flex-start; 
                height: 100vh; 
                margin: 0; 
                padding-top: 50px;
            }
            .icon { font-size: 80px; margin-bottom: 10px; }
            .container { width: 90%; max-width: 500px; text-align: left; }
            h1 { 
                font-size: 1.2rem; 
                text-transform: uppercase; 
                letter-spacing: 1px; 
                margin-bottom: 5px; 
                color: #555;
            }
            .bet { 
                font-size: 2.5rem; 
                font-weight: 700; 
                margin-bottom: 20px; 
                border-bottom: 4px solid black;
                display: inline-block;
            }
            ul { 
                list-style-type: none; 
                padding: 0; 
                margin: 0;
            }
            li { 
                font-size: 1.2rem; 
                margin-bottom: 15px; 
                padding-left: 25px; 
                position: relative;
                line-height: 1.5;
            }
            li::before { 
                content: "•"; 
                position: absolute; 
                left: 0; 
                font-weight: bold; 
            }
        </style>
    </head>
    <body>
        <div class="icon">⛹️‍♂️</div>
        <div class="container">
            <h1>Lock of the Day:</h1>
            <div class="bet">Golden State +5.5</div>
            <ul>
                <li>72% of sharp money is tracking toward the Warriors at the current line.</li>
                <li>Golden State is 18-13 Against the Spread (ATS) on the road over the last 2 months.</li>
                <li>The Warriors are 4-1 ATS in their last 5 matchups following a double-digit loss.</li>
            </ul>
        </div>
    </body>
    </html>
